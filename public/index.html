<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>mygh</title>
    <meta name="description" content="Create better social preview links for GitHub repositories, releases, files, commits, pull requests, and issues.">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="studio" aria-labelledby="app-title">
        <header class="app-header">
          <a class="brand" href="/" aria-label="mygh home">
            <span class="brand-mark" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M9.2 14.8a3.2 3.2 0 0 1 0-4.5l1.1-1.1 1.4 1.4-1.1 1.1a1.2 1.2 0 0 0 1.7 1.7l1.1-1.1 1.4 1.4-1.1 1.1a3.2 3.2 0 0 1-4.5 0Z"></path>
                <path d="M12.3 10.3 9.9 7.9l1.4-1.4 2.4 2.4-1.4 1.4Z"></path>
                <path d="M13.7 17.5 10 13.8l1.4-1.4 3.7 3.7a1.2 1.2 0 0 0 1.7-1.7l-1.1-1.1 1.4-1.4 1.1 1.1a3.2 3.2 0 0 1-4.5 4.5Z"></path>
              </svg>
            </span>
            <span class="brand-name">my<span>gh</span></span>
          </a>
          <p class="header-kicker">GitHub link studio</p>
        </header>

        <div class="studio-grid">
          <section class="control-panel" aria-label="Build link">
            <section class="intro">
              <p class="eyebrow">Open graph workshop</p>
              <h1 id="app-title">Shape a GitHub link into a card worth opening.</h1>
            </section>

            <form class="composer" id="inspect-form">
              <label for="github-url">GitHub URL</label>
              <div class="input-card">
                <span class="github-dot" aria-hidden="true">GH</span>
                <input
                  id="github-url"
                  name="github-url"
                  type="url"
                  placeholder="https://github.com/owner/repo/pull/123"
                  autocomplete="off"
                  required
                >
              </div>
              <button class="primary-button" type="submit">
                <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                  <path d="m13 2-7 11h5l-1 9 8-12h-5l0-8Z"></path>
                </svg>
                Preview link
              </button>
            </form>

            <section class="customizer" aria-label="Customize preview">
              <label for="card-title">Title</label>
              <input id="card-title" maxlength="90" placeholder="Paste a GitHub link first">

              <label for="card-description">Description</label>
              <textarea id="card-description" maxlength="220" rows="4" placeholder="Repository, file, issue, PR, or commit summary"></textarea>

              <fieldset class="appearance">
                <legend>Appearance</legend>
                <label class="theme-choice">
                  <input type="radio" name="theme" value="paper" checked>
                  <span>
                    <i class="theme-thumb thumb-paper" aria-hidden="true"></i>
                    Paper
                  </span>
                </label>
                <label class="theme-choice">
                  <input type="radio" name="theme" value="mint">
                  <span>
                    <i class="theme-thumb thumb-mint" aria-hidden="true"></i>
                    Mint
                  </span>
                </label>
                <label class="theme-choice">
                  <input type="radio" name="theme" value="dusk">
                  <span>
                    <i class="theme-thumb thumb-dusk" aria-hidden="true"></i>
                    Dusk
                  </span>
                </label>
              </fieldset>

              <fieldset class="chip-controls">
                <legend>Info chips</legend>
                <label>
                  <input type="checkbox" name="info-chip" value="language" checked aria-describedby="kind-chip-tip">
                  <span class="chip-label">Kind</span>
                  <span class="chip-tooltip" id="kind-chip-tip" role="tooltip">Shows the item type, or language for file links.</span>
                </label>
                <label>
                  <input type="checkbox" name="info-chip" value="stars" checked aria-describedby="metric-chip-tip">
                  <span class="chip-label">Metric</span>
                  <span class="chip-tooltip" id="metric-chip-tip" role="tooltip">Shows stars, file size, changed files, or comments.</span>
                </label>
                <label>
                  <input type="checkbox" name="info-chip" value="extra" checked aria-describedby="extra-chip-tip">
                  <span class="chip-label">Extra</span>
                  <span class="chip-tooltip" id="extra-chip-tip" role="tooltip">Shows forks, release tag, line range or ref, diff, or issue/PR state.</span>
                </label>
              </fieldset>
            </section>
          </section>

          <div class="preview-column">
            <section class="preview-section" aria-label="Preview">
              <div class="section-heading">
                <h2>Preview</h2>
                <span id="preview-kind">GitHub</span>
              </div>

              <div class="preview-frame">
                <canvas
                  class="preview-card theme-paper"
                  id="preview-card"
                  width="1200"
                  height="630"
                  aria-label="Generated GitHub social preview"
                ></canvas>
              </div>
            </section>

            <aside class="publish-panel" aria-label="Publish link">
              <button class="save-button" id="create-link" type="button" disabled>Save share link</button>
              <p class="storage-note">mygh keeps the preview ready behind a short share URL.</p>

              <section class="result" id="result" hidden>
                <div class="ready-row">
                  <span class="ready-check" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false">
                      <path d="m6 12 4 4 8-9"></path>
                    </svg>
                  </span>
                  <div>
                    <strong>Your link is ready!</strong>
                    <p>Share your short link anywhere.</p>
                  </div>
                </div>

                <label class="sr-only" for="share-url">Share URL</label>
                <div class="share-box">
                  <input id="share-url" readonly>
                  <button id="copy-link" type="button" aria-label="Copy link">
                    <svg viewBox="0 0 24 24" focusable="false">
                      <path d="M8 8h10v10H8z"></path>
                      <path d="M6 16H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                  </button>
                </div>

                <div class="action-list">
                  <a id="preview-link" href="#" target="_blank" rel="noreferrer">
                    <span>Open preview page</span>
                    <svg viewBox="0 0 24 24" focusable="false">
                      <path d="M7 17 17 7M9 7h8v8"></path>
                    </svg>
                  </a>
                </div>
              </section>

              <p class="status" id="status" role="status"></p>
            </aside>
          </div>
        </div>

        <footer class="site-footer">
          Created by <a href="https://github.com/DiogoNeves" target="_blank" rel="noreferrer">Diogo Neves</a>.
        </footer>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
